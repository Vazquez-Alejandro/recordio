version: '3'
services:
  recordio:
    build: .
    ports:
      - "8223:8223"
    environment:
      - DATABASE_URL=sqlite:///./recordio.db
      - JWT_SECRET=${JWT_SECRET:-cambiar-en-produccion}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID:-}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN:-}
      - TWILIO_WHATSAPP_NUMBER=${TWILIO_WHATSAPP_NUMBER:-whatsapp:+14155238886}
    volumes:
      - ./recordio.db:/app/recordio.db
    restart: unless-stopped
