<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro - Recordio</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
  <div class="bg-white p-8 rounded-2xl shadow-sm border w-full max-w-sm">
    <h1 class="text-2xl font-bold text-center mb-6">Crear cuenta</h1>
    {% if error %}
      <p class="text-red-600 text-sm text-center mb-4">{{ error }}</p>
    {% endif %}
    <form method="POST" class="flex flex-col gap-4">
      <input type="text" name="name" placeholder="Nombre del negocio" required
        class="border rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-green-500">
      <input type="email" name="email" placeholder="Email" required
        class="border rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-green-500">
      <input type="password" name="password" placeholder="Contraseña" required minlength="6"
        class="border rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-green-500">
      <button type="submit" class="bg-green-600 text-white py-2 rounded-lg hover:bg-green-700">Registrarse</button>
    </form>
    <p class="text-sm text-gray-500 text-center mt-4">Ya tenés cuenta? <a href="/login" class="text-green-600">Ingresá</a></p>
  </div>
</body>
</html>
